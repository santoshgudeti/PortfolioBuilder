<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO Meta Tags -->
  <title>FolioAI — AI Portfolio Builder | Turn Your Resume Into a Stunning Website</title>
  <meta name="description"
    content="Upload your resume and let AI create a beautiful, professional portfolio website in 60 seconds. 15 stunning templates, custom domains, and zero coding required. Stand out to recruiters and clients." />
  <meta name="keywords"
    content="portfolio builder, AI portfolio, resume to website, online portfolio, professional portfolio, developer portfolio, resume builder, personal website builder, portfolio templates, career website" />
  <meta name="author" content="FolioAI" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://folioai.com" />

  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://folioai.com/" />
  <meta property="og:title" content="FolioAI — Build a Portfolio That Gets You Hired" />
  <meta property="og:description"
    content="Upload your resume. Get a stunning portfolio website powered by AI in under 60 seconds. 15 templates, dark mode, custom domains — all free." />
  <meta property="og:image" content="https://folioai.com/og-image.png" />
  <meta property="og:site_name" content="FolioAI" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="FolioAI — AI Portfolio Builder" />
  <meta name="twitter:description"
    content="Stop struggling with website builders. Upload your resume and let AI create a stunning portfolio in 60 seconds." />
  <meta name="twitter:image" content="https://folioai.com/og-image.png" />

  <!-- Theme & PWA Hints -->
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="FolioAI" />

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "FolioAI",
      "description": "AI-powered portfolio builder that converts resumes into stunning personal websites in 60 seconds.",
      "url": "https://folioai.com",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "AI-powered resume parsing",
        "15 portfolio templates",
        "Custom domain support",
        "Dark mode",
        "One-click publishing",
        "Portfolio analytics"
      ]
    }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@400;600;700&family=Outfit:wght@300;400;600;800&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
