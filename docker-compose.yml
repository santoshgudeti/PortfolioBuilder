version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_APP_DOMAIN: ${VITE_APP_DOMAIN:-}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: folioai-web
    ports:
      - "8000:8000"
    environment:
      # Pass through required configuration over API
      - FRONTEND_URL=http://localhost:8000
      - ENV=production
    # Env file inside backend context overrides above if conflict
    env_file:
      - ./.env
    volumes:
      - ./backend/uploads:/app/backend/uploads
    restart: unless-stopped
